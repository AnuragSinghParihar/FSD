apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopmart-ingress
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - host: shopmart.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shopmart-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shopmart-frontend-svc
                port:
                  number: 80
